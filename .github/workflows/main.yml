name: Deploy AKS with Terraform

on:
  push:
    branches:
      - main   # adjust to your branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4   # upgraded to latest

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.7

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan

    - name: Azure Login
      uses: azure/login@v2   # upgraded to latest
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get AKS credentials
      run: az aks get-credentials --resource-group Terraform-demo-rg --name Terraform-aks-cluster --overwrite-existing

    - name: Deploy Kubernetes manifest
      run: kubectl apply -f aks-store-quickstart.yaml
